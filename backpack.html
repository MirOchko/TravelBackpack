  <body background="https://www.transparenttextures.com/patterns/cubes.png">
    <h1>Збираємо речі</h1>
    <p>
      Пам'ятай: <b>найважливіше</b> (жирний) — це документи.
      <i>Ніколи</i> (курсив) не клади їх на дно сумки.
    </p>

    <p>
      <strong>Увага!</strong> (важливий текст) Перевір вагу валізи.
      <em>Зайві речі</em> (акцент) краще залишити вдома.
    </p>
